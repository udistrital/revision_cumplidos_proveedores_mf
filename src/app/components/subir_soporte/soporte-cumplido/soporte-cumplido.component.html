<section>
  <div class="card-content">
    <mat-card>
      <div>
        <mat-card
          class="soporte-cumplido-card"
          *ngFor="let soporte of listaSoportes"
        >
          <mat-card-header class="soporte-cumplido-header">
            <mat-card-title class="soporte-cumplido-title">{{
              soporte.nombre
            }}</mat-card-title>
          </mat-card-header>
          <div class="box-docs">
            <mat-card-content class="soporte-cumplido-content">
              <div>
                <div class="box-docs">
                  <p class="soporte-cumplido-fecha">{{ soporte.fecha }}</p>

                  <p class="soporte-cumplido-item">{{ soporte.item }}</p>
                </div>

                <div>
                  <textarea matInput class="box-text-area" disabled="true"
                    >{{ soporte.comentario }} </textarea
                  >
                </div>
              </div>
            </mat-card-content>
          </div>
          <mat-card-footer>
            <div class="btn-box">
              <div>
                <button
                  mat-button
                  class="btn-eliminar"
                  (click)="eliminarSoporte(soporte)"
                >
                  Eliminar
                </button>
              </div>
              <div>
                <button
                  mat-button
                  class="ver-documentos-button"
                  (click)="openVerSoporte(soporte.archivo)"
                >
                  VER
                </button>
              </div>
            </div>
          </mat-card-footer>
        </mat-card>
      </div>
    </mat-card>
  </div>
</section>
